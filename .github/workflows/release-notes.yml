name: Generate Release Notes

on:
  push:
    branches:
      - main
      - master
      - 'one-[0-9].[0-9]'
      - 'one-[0-9].[1-9][0-9]'

jobs:
  process_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read

    steps:
      - name: Checkout Source Repo
        uses: actions/checkout@v6
        with:
          path: one-ee
          fetch-depth: 2

      - name: Gather Context
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PUSH_BRANCH="${{ github.ref_name }}"
          TARGET_BRANCH=$([[ "$PUSH_BRANCH" == "master" || "$PUSH_BRANCH" == "main" ]] && echo "master" || echo "${PUSH_BRANCH}-maintenance")
          echo "target_branch=$TARGET_BRANCH" >> "$GITHUB_OUTPUT"

          COMMIT_MSG=$(git -C one-ee log -1 --pretty=format:%B)
          DIFF_CONTENT=$(git -C one-ee show HEAD | head -c 15000)

          ISSUE_NUM=$(echo "$COMMIT_MSG" | grep -oP 'MarioRobres/test#\K\d+' | head -n 1)

          if [[ -z "$ISSUE_NUM" ]]; then
            echo "No issue referenced in the commit message. Skipping workflow."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ISSUE_BODY=$(gh issue view "$ISSUE_NUM" --repo MarioRobres/test --json body --jq .body || echo "Issue body not found.")

          {
            echo 'commit_msg<<EOF'
            echo "$COMMIT_MSG"
            echo EOF

            echo 'code_diff<<EOF'
            echo "$DIFF_CONTENT"
            echo EOF

            echo 'issue_body<<EOF'
            echo "$ISSUE_BODY"
            echo EOF
          } >> "$GITHUB_OUTPUT"

          echo "issue_num=$ISSUE_NUM" >> "$GITHUB_OUTPUT"

      - name: Checkout Website Repo
        if: steps.context.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          repository: MarioRobres/website
          ref: ${{ steps.context.outputs.target_branch }}
          path: documentation/website
          token: ${{ secrets.OPENNEBULA_CI_TOKEN }}

      - name: Execute AI Release Agent
        if: steps.context.outputs.skip != 'true'
        id: ai_agent
        uses: openai/codex-action@v1.6
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          model: gpt-5.4-mini
          prompt: |
            Use the SKILL `process-release-notes` (in ./one-ee/.codex/skills/process-release-notes/SKILL.md) and follow its instructions to process the workspace.

            ### CONTEXT ###
            TARGET_BRANCH: ${{ steps.context.outputs.target_branch }}
            ISSUE_NUMBER: ${{ steps.context.outputs.issue_num }}
            COMMIT_MSG: ${{ steps.context.outputs.commit_msg }}

            ISSUE_BODY:
            ${{ steps.context.outputs.issue_body }}

            CODE_DIFF:
            ${{ steps.context.outputs.code_diff }}

      - name: Create Pull Request via GitHub CLI
        if: steps.context.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.OPENNEBULA_CI_TOKEN }}
          TARGET_ISSUE: ${{ steps.context.outputs.issue_num }}
          TARGET_BRANCH: ${{ steps.context.outputs.target_branch }}
          AI_JSON: ${{ steps.ai_agent.outputs.final-message }}
        run: |
          if [[ -z "$AI_JSON" || "$AI_JSON" == "[]" ]]; then
            echo "No updates required by AI."
            exit 0
          fi

          cd documentation/website

          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            ISSUE_TYPE=$(echo "$AI_JSON" | jq -r '.[0].issue_type')
            DOC_LINKS=$(echo "$AI_JSON" | jq -r '.[0].doc_links // empty')

            # Base branch name without timestamp
            BASE_BRANCH_NAME="ai/${ISSUE_TYPE}-${TARGET_ISSUE}-${TARGET_BRANCH}"
            FINAL_BRANCH_NAME="$BASE_BRANCH_NAME"

            # Check if branch already exists on the remote
            if git ls-remote --exit-code --heads origin "$FINAL_BRANCH_NAME" > /dev/null 2>&1; then
              echo "Branch $FINAL_BRANCH_NAME already exists. Appending timestamp to avoid collision..."
              TIMESTAMP=$(date +%s)
              FINAL_BRANCH_NAME="${BASE_BRANCH_NAME}-${TIMESTAMP}"
            fi

            git checkout -b "$FINAL_BRANCH_NAME"

            TYPE_UPPER=$(echo "$ISSUE_TYPE" | tr '[:lower:]' '[:upper:]')
            TITLE="${TYPE_UPPER} MarioRobres/test#${TARGET_ISSUE}: add release notes for ${TARGET_BRANCH}"

            git add .
            git commit -m "$TITLE"
            git push origin "$FINAL_BRANCH_NAME"

            PR_BODY_TEXT="Auto-generated release notes for Issue #${TARGET_ISSUE} in ${TARGET_BRANCH}."

            if [[ -n "$DOC_LINKS" ]]; then
              PR_BODY_TEXT="$PR_BODY_TEXT\n\n### Potential Documentation Link(s):\n$DOC_LINKS\n\n*Reviewer: Please verify if this hyperlink is accurate.*"
            fi

            gh pr create \
              --repo "MarioRobres/website" \
              --title "$TITLE" \
              --body - <<< $(echo -e "$PR_BODY_TEXT") \
              --head "$FINAL_BRANCH_NAME" \
              --base "$TARGET_BRANCH"
          else
            echo "AI claimed modifications, but git status is clean. Skipping PR for $TARGET_BRANCH."
          fi
